project_id = "er-custom-match-calculator"

[auth]
site_url = "https://xxoxx1309-byte.github.io/ererecc/"
additional_redirect_urls = ["https://xxoxx1309-byte.github.io/ererecc/**"]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "60s"
otp_length = 6
otp_expiry = 600

[auth.email.template.magic_link]
subject = "내전 계산기 인증번호"
content_path = "./supabase/templates/magic_link.html"

[auth.email.smtp]
enabled = true
host = "smtp.gmail.com"
port = 587
user = "env(SMTP_USER)"
pass = "env(SMTP_PASS)"
admin_email = "xxoxx1309@gmail.com"
sender_name = "내전 계산기"

[auth.rate_limit]
email_sent = 30

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[functions.rank-lookup]
verify_jwt = false
